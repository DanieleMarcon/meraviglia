name: Quality Check

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
        working-directory: meraviglia-cashflow

      - run: npm run check
        working-directory: meraviglia-cashflow
